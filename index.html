<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Markdown 表格產生器</title>
<style>
  body { font-family: "Segoe UI", sans-serif; padding: 20px; background: #f8f9fa; }
  h1 { color: #007bff; }
  h2 { color: #333; }
  select, button, input, textarea { font-size: 1em; margin: 5px; padding: 6px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; background: #fff; }
  th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
  textarea { resize: both; }
  .btn-group { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; }
  .section { background: #f9fbfd; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
  pre.output-box { background: #eef5ff; border: 1px solid #ccd; padding: 10px; white-space: pre-wrap; border-radius: 5px; margin-top: 20px; }
  .styled-button {
    background-color: #007bff;
    color: white;
    padding: 6px 14px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    font-size: 0.95em;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }
  .styled-button:hover { background-color: #0056b3; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<h1>Markdown 表格產生器</h1>

<div class="section">
  <label for="formType">選擇表單類型（手動輸入時使用，可透過下方「匯入 Excel 範本」載入真實欄位）：</label>
  <select id="formType" onchange="renderForm()"></select>

  <div class="btn-group">
    <button onclick="addRow()">➕ 新增一筆（手動）</button>
    <button onclick="triggerTemplateImport()">🗂️ 匯入 Excel 範本（多分頁）</button>
    <button onclick="triggerImport()">📂 匯入單一表格（Excel/JSON）</button>
    <button onclick="triggerPaste()">📑 局部 EXCEL 表格資料轉換 md</button>
    <button onclick="generateManualMarkdown()">✍️ 手動輸入轉 Markdown</button>
    <button onclick="copyMarkdown()">📄 複製 Markdown 結果</button>
    <button onclick="downloadMarkdown()">⬇️ 下載 .md</button>
    <button onclick="downloadCSV()">📊 下載 .csv</button>
    <button onclick="clearAll()">🧹 重設</button>
  </div>
  <p style="font-size:0.85em; color:#555; margin:-8px 0 10px;">
    「匯入 Excel 範本」會讀取整份活頁簿的每個分頁，把各分頁的標題列設為該分頁的欄位範本，並直接把所有分頁轉成分組 Markdown。
  </p>

  <div id="dataForm"></div>

  <input accept=".xlsx" id="templateInput" onchange="importWorkbookTemplate(event)" style="display:none" type="file"/>
  <input accept=".xlsx,.json" id="fileInput" onchange="handleFile(event)" style="display:none" type="file"/>
  <textarea id="pasteArea" placeholder="請直接貼上表格資料，第一列會當標題" style="display:none; width:100%; height:150px; resize:both;" oninput="handlePaste()"></textarea>
  <div id="pasteStats" style="margin-top:5px; font-size:0.9em; color:#555;"></div>
  <div id="pasteControl" style="display:none; margin:10px 0;">
    <button onclick="processPastedData()">✅ 表格貼上完成，產生 Markdown</button>
  </div>
</div>

<h2>Markdown 結果：</h2>
<pre class="output-box" id="output"></pre>

<h2>資料表格預覽：</h2>
<div id="previewArea"></div>

<div class="section">
  <h2>📋 貼上 Markdown 表格</h2>
  <p style="font-size:0.9em; color:#555;">支援以 <code>#### 標題</code> 分隔多張表格。</p>
  <textarea id="mdTableInput" placeholder="請貼上 Markdown 表格..." rows="10" style="width: 100%;"></textarea>
  <div class="btn-group">
    <button class="styled-button" onclick="convertMarkdownToTable()">📋 轉換為表格（支援分組）</button>
    <button class="styled-button" onclick="cleanMarkdown()">🧹 自動修正 Markdown 表格</button>
    <button class="styled-button" onclick="exportMarkdownToXLSX()">📊 匯出 Excel</button>
    <button class="styled-button" onclick="exportMarkdownToCSV()">📄 匯出 CSV</button>
    <button class="styled-button" onclick="exportMarkdownToPDF()">🖨️ 匯出 PDF</button>
    <button class="styled-button" onclick="saveAsJSON()">💾 儲存為 JSON</button>
  </div>
  <div id="mdTablePreview" style="margin-top:20px;"></div>
</div>

<div style="margin-top: 40px; font-size: 0.85em; color: #555; border-top: 1px solid #ccc; padding-top: 10px;">
  © 2025 OU SHOU SHUO — Released under the <a href="https://opensource.org/licenses/MIT" target="_blank">MIT License</a>.
</div>

<script>
// 內建預設欄位範本；匯入 Excel 範本後會以分頁名稱新增/覆蓋對應項目
const defaultSchemas = {
  "網路資訊": { fields: ["網路資訊", "IP", "Subnet", "Gateway", "備註"], textareaFields: ["備註"] },
  "電腦設備": { fields: ["電腦名稱", "管理者", "IP", "網址", "TV or Anydesk", "備註"], textareaFields: ["備註"] },
  "網路設備": { fields: ["網路設備", "管理者", "IP", "網址", "備註"], textareaFields: ["備註"] },
  "列印設備": { fields: ["列印設備", "管理者", "IP", "網址", "備註"], textareaFields: ["備註"] },
  "網路服務": { fields: ["網路服務", "帳號", "網址", "備註"], textareaFields: ["備註"] },
  "軟體資產": { fields: ["產品名稱", "產品金鑰", "類型", "授權數量", "安裝日", "用戶端", "備註"], textareaFields: ["備註", "產品金鑰"] }
};
const typeIcons = {
  "網路資訊": "🌐", "電腦設備": "💻", "網路設備": "📡", "列印設備": "🖨️", "網路服務": "🚀", "軟體資產": "📚"
};
// 找不到精確對應的類型名稱時，用關鍵字猜一個圖示（依序比對，符合第一個就用）
const iconKeywords = [
  [/wan|線路|區域網/i, "🌐"],
  [/伺服器|server/i, "🖥️"],
  [/印表|列印|print/i, "🖨️"],
  [/軟體|授權|license/i, "📚"],
  [/網域|dns/i, "🔗"],
  [/vpn|服務/i, "🚀"],
  [/設備|device/i, "📡"],
  [/電腦|pc\b/i, "💻"],
  [/網路|network|ip\b/i, "🌐"]
];

function iconForTitle(title) {
  if (typeIcons[title]) return typeIcons[title];
  const hit = iconKeywords.find(([re]) => re.test(title));
  return hit ? hit[1] : '📁';
}

// 去掉標題開頭已經有的圖示，避免「#### 標題」重複轉換時圖示越疊越多
function stripLeadingIcon(title) {
  return String(title ?? '').replace(/^\p{Extended_Pictographic}️?\s+/u, '').trim();
}

let schemas = JSON.parse(JSON.stringify(defaultSchemas));

let pastedData = [];
window._mdParsedTable = [];
window._mdGroupedTables = [];

function rebuildFormTypeSelect(preferredValue) {
  const select = document.getElementById('formType');
  const previous = preferredValue ?? select.value;
  select.innerHTML = Object.keys(schemas).map(name =>
    `<option value="${esc(name)}">${iconForTitle(name)} ${esc(name)}</option>`
  ).join('');
  if (schemas[previous]) select.value = previous;
}

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function splitCells(line) {
  return line.split(/\t|\s{2,}/).map(cell => cell.trim());
}

// 讀取工作表所有儲存格；若儲存格帶有超連結（顯示文字與網址不同也一樣），
// 直接輸出成 Markdown 連結語法 [文字](網址)，而不是只讀顯示文字
function sheetToRowsWithLinks(sheet) {
  if (!sheet || !sheet['!ref']) return [];
  const range = XLSX.utils.decode_range(sheet['!ref']);
  const rows = [];

  for (let r = range.s.r; r <= range.e.r; r++) {
    const row = [];
    for (let c = range.s.c; c <= range.e.c; c++) {
      row.push(cellToText(sheet[XLSX.utils.encode_cell({ r, c })]));
    }
    rows.push(row);
  }

  return rows.filter(row => row.some(cell => cell !== ''));
}

function cellToText(cell) {
  if (!cell) return '';
  const text = String(cell.w ?? cell.v ?? '').trim();
  const target = cell.l && cell.l.Target ? cell.l.Target.trim() : '';
  if (!target) return text;
  return `[${(text || target).replace(/[[\]]/g, '')}](${target})`;
}

// Markdown 表格用：跳脫儲存格內的 | 避免拆錯欄位
function mdCell(value) {
  return String(value ?? '').replace(/\|/g, '\\|');
}

const MD_LINK_RE = /^\[([^\]]*)\]\((\S+)\)$/;

// 預覽表格用：若儲存格是 [文字](網址) 格式，還原成真正可點擊的連結
function cellPreviewHtml(value) {
  const text = String(value ?? '');
  const match = text.match(MD_LINK_RE);
  if (!match) return esc(text);
  const [, label, url] = match;
  return `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label || url)}</a>`;
}

// ---------- 手動輸入表單 ----------

function renderForm(data = []) {
  const schema = schemas[document.getElementById('formType').value];
  const container = document.getElementById('dataForm');
  if (!schema) { container.innerHTML = ''; return; }

  let html = `<table id="dataTable"><thead><tr>${schema.fields.map(f => `<th>${esc(f)}</th>`).join('')}<th>操作</th></tr></thead><tbody>`;
  if (data.length > 0) {
    data.forEach(row => { html += renderRowHtml(schema, row); });
  } else {
    html += renderRowHtml(schema);
  }
  html += `</tbody></table>`;
  container.innerHTML = html;
}

function renderRowHtml(schema, row = null) {
  return `<tr>` + schema.fields.map((field, idx) => {
    const value = row ? esc(row[idx] ?? '') : '';
    return schema.textareaFields.includes(field)
      ? `<td><textarea rows="2" placeholder="${esc(field)}">${value}</textarea></td>`
      : `<td><input type="text" placeholder="${esc(field)}" value="${value}"></td>`;
  }).join('') + `<td><button onclick="deleteRow(this)">刪除</button></td></tr>`;
}

function addRow() {
  const schema = schemas[document.getElementById('formType').value];
  if (!schema) return alert("請先選擇或匯入欄位範本！");
  document.querySelector("#dataTable tbody").insertAdjacentHTML('beforeend', renderRowHtml(schema));
}

function deleteRow(btn) {
  btn.closest('tr').remove();
}

function generateManualMarkdown() {
  const schema = schemas[document.getElementById('formType').value];
  if (!schema) return alert("請先選擇或匯入欄位範本！");
  const fields = schema.fields;
  const rows = document.querySelectorAll("#dataTable tbody tr");

  let markdown = `| ${fields.join(" | ")} |\n`;
  markdown += `| ${fields.map(() => "---").join(" | ")} |\n`;

  const values = Array.from(rows).map(row =>
    Array.from(row.querySelectorAll('input, textarea')).map(e => e.value.trim())
  );
  values.forEach(row => { markdown += `| ${row.join(" | ")} |\n`; });

  document.getElementById('output').textContent = markdown;
  renderPreviewTable(fields, values);
  window._mdParsedTable = [fields, ...values];
}

function renderPreviewTable(fields, rows) {
  let html = `<table><thead><tr>${fields.map(f => `<th>${esc(f)}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(row => {
    html += `<tr>${row.map(v => `<td>${cellPreviewHtml(v)}</td>`).join('')}</tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('previewArea').innerHTML = html;
}

function clearAll() {
  renderForm();
  document.getElementById('output').textContent = '';
  document.getElementById('previewArea').innerHTML = '';
  document.getElementById('mdTableInput').value = '';
  document.getElementById('mdTablePreview').innerHTML = '';
  document.getElementById('fileInput').value = '';
  pastedData = [];
  window._mdParsedTable = [];
  window._mdGroupedTables = [];
}

// ---------- 複製 / 下載 ----------

function copyMarkdown() {
  const text = document.getElementById('output').textContent;
  if (!text) return alert("請先產生內容！");
  navigator.clipboard.writeText(text).then(() => alert('已複製到剪貼簿！'));
}

function downloadMarkdown() {
  const text = document.getElementById('output').textContent;
  if (!text) return alert("請先產生內容！");
  downloadBlob(new Blob(["﻿" + text], { type: 'text/markdown;charset=utf-8;' }), "table.md");
}

function downloadCSV() {
  if (!window._mdParsedTable || !window._mdParsedTable.length) return alert("目前沒有可匯出的資料！");
  const csv = window._mdParsedTable.map(row =>
    row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(",")
  ).join("\n");
  downloadBlob(new Blob(["﻿" + csv], { type: 'text/csv;charset=utf-8;' }), "table.csv");
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ---------- 局部貼上（單一表格） ----------

function triggerPaste() {
  const pasteArea = document.getElementById('pasteArea');
  pasteArea.style.display = "block";
  pasteArea.value = '';
  document.getElementById('pasteStats').innerHTML = '';
  document.getElementById('pasteControl').style.display = "block";
  pasteArea.focus();
}

function handlePaste() {
  const pasteArea = document.getElementById('pasteArea');
  const statsArea = document.getElementById('pasteStats');
  const lines = pasteArea.value.trim().split('\n').filter(line => line.trim() !== "");
  if (lines.length === 0) {
    statsArea.innerHTML = '';
    return;
  }
  const lineHeight = 24, minHeight = 150, maxHeight = 600;
  pasteArea.style.height = Math.min(maxHeight, Math.max(minHeight, lines.length * lineHeight)) + "px";
  statsArea.innerHTML = `偵測到 ${lines.length} 列，${splitCells(lines[0]).length} 欄`;
}

function processPastedData() {
  const pasteArea = document.getElementById('pasteArea');
  const raw = pasteArea.value.trim();
  if (!raw) return alert("請先貼上資料！");

  const lines = raw.split('\n').filter(l => l.trim() !== '').map(splitCells);
  if (lines.length < 2) return alert("貼上的資料格式不足，至少需要標題列與一列資料");

  const colCount = lines[0].length;
  pastedData = lines.map(row => {
    while (row.length < colCount) row.push('');
    return row;
  });

  generatePastedMarkdown();

  pasteArea.style.display = "none";
  document.getElementById('pasteStats').innerHTML = '';
  document.getElementById('pasteControl').style.display = "none";
}

function generatePastedMarkdown() {
  let markdown = `| ${pastedData[0].map(mdCell).join(' | ')} |\n`;
  markdown += `| ${pastedData[0].map(() => "---").join(' | ')} |\n`;
  pastedData.slice(1).forEach(row => { markdown += `| ${row.map(mdCell).join(' | ')} |\n`; });

  document.getElementById('output').textContent = markdown;
  renderPreviewTable(pastedData[0], pastedData.slice(1));
  window._mdParsedTable = pastedData;
}

// ---------- 匯入 Excel / JSON ----------

function triggerImport() {
  document.getElementById('fileInput').click();
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();

  if (file.name.endsWith('.json')) {
    reader.onload = e => {
      try {
        pastedData = JSON.parse(e.target.result);
        generatePastedMarkdown();
      } catch {
        alert("JSON 無法解析！");
      }
    };
    reader.readAsText(file);
  } else if (file.name.endsWith('.xlsx')) {
    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      pastedData = sheetToRowsWithLinks(workbook.Sheets[workbook.SheetNames[0]]);
      generatePastedMarkdown();
    };
    reader.readAsArrayBuffer(file);
  } else {
    alert("請上傳 .xlsx 或 .json 檔案！");
  }
  event.target.value = '';
}

// ---------- 匯入 Excel 範本（多分頁 → 定義欄位 + 轉換 Markdown） ----------

function triggerTemplateImport() {
  document.getElementById('templateInput').click();
}

function importWorkbookTemplate(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith('.xlsx')) {
    alert("請上傳 .xlsx 檔案！");
    event.target.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const grouped = [];

    workbook.SheetNames.forEach(sheetName => {
      const rows = sheetToRowsWithLinks(workbook.Sheets[sheetName]);
      if (rows.length === 0) return; // 空白分頁略過

      const title = stripLeadingIcon(sheetName);
      const header = rows[0];
      const dataRows = rows.slice(1);
      const textareaFields = header.filter((h, idx) => dataRows.some(r => (r[idx] || '').length > 25));

      schemas[title] = { fields: header, textareaFields };
      if (dataRows.length > 0) grouped.push({ title, data: [header, ...dataRows] });
    });

    if (Object.keys(schemas).length === 0) {
      alert("這個 Excel 沒有偵測到任何欄位資料");
      return;
    }

    rebuildFormTypeSelect(stripLeadingIcon(workbook.SheetNames[0]));
    renderForm();

    if (grouped.length > 0) {
      window._mdGroupedTables = grouped;
      window._mdParsedTable = grouped.length === 1 ? grouped[0].data : grouped.flatMap(g => g.data);
      const { finalMarkdown, previewHTML } = buildGroupedOutputs(grouped);
      document.getElementById('mdTableInput').value = finalMarkdown;
      document.getElementById('output').textContent = finalMarkdown;
      document.getElementById('mdTablePreview').innerHTML = previewHTML;
    }

    alert(`✅ 已匯入 ${workbook.SheetNames.length} 個分頁，欄位範本與 Markdown 已更新！`);
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}

// ---------- 貼上 Markdown 表格（支援分組） ----------

// 把 [{title, data:[header, ...rows]}] 轉成分組 Markdown 文字與預覽 HTML，供轉換/範本匯入共用
function buildGroupedOutputs(grouped) {
  let finalMarkdown = "";
  let previewHTML = "";

  grouped.forEach(group => {
    const [header, ...dataRows] = group.data;
    const icon = iconForTitle(group.title);

    finalMarkdown += `#### ${icon} ${group.title}\n`;
    finalMarkdown += `| ${header.map(mdCell).join(" | ")} |\n`;
    finalMarkdown += `| ${header.map(() => "---").join(" | ")} |\n`;
    dataRows.forEach(row => { finalMarkdown += `| ${row.map(mdCell).join(" | ")} |\n`; });
    finalMarkdown += "\n";

    previewHTML += `<h4>${icon} ${esc(group.title)}</h4>`;
    previewHTML += "<table><thead><tr>" + header.map(h => `<th>${esc(h)}</th>`).join("") + "</tr></thead><tbody>";
    dataRows.forEach(row => {
      previewHTML += "<tr>" + row.map(cell => `<td>${cellPreviewHtml(cell)}</td>`).join("") + "</tr>";
    });
    previewHTML += "</tbody></table>";
  });

  return { finalMarkdown: finalMarkdown.trim(), previewHTML };
}

function convertMarkdownToTable() {
  const raw = document.getElementById('mdTableInput').value.trim();
  if (!raw) return alert("請貼上有效的 Markdown 資料");

  const lines = raw.split("\n");
  const groups = [];
  let currentTitle = null;
  let currentBlock = [];

  for (const line of lines) {
    if (line.startsWith("#### ")) {
      if (currentTitle && currentBlock.length > 0) groups.push({ title: currentTitle, lines: currentBlock });
      currentTitle = stripLeadingIcon(line.replace(/^####\s+/, ""));
      currentBlock = [];
    } else {
      currentBlock.push(line);
    }
  }
  if (currentTitle && currentBlock.length > 0) {
    groups.push({ title: currentTitle, lines: currentBlock });
  } else if (!currentTitle && currentBlock.length > 0) {
    groups.push({ title: "表格", lines: currentBlock });
  }

  const grouped = [];

  groups.forEach(group => {
    const tableLines = group.lines.filter(l => l.includes("|"));
    const rows = tableLines.map(line => {
      let txt = line.trim();
      if (!txt.startsWith("|")) txt = "|" + txt;
      if (!txt.endsWith("|")) txt = txt + "|";
      const fields = txt.split("|").slice(1, -1).map(cell => cell.trim());
      const joined = fields.join("").toLowerCase();
      if (joined.replace(/-/g, "") === "") return null; // 分隔線 ---
      return fields.every(cell => cell === "") ? null : fields;
    }).filter(r => r !== null);

    if (rows.length < 2) return; // 至少要有標題 + 一列資料

    const colCount = Math.max(...rows.map(r => r.length));
    const normalized = rows.map(row => {
      while (row.length < colCount) row.push("");
      return row;
    });

    grouped.push({ title: group.title, data: normalized });
  });

  if (grouped.length === 0) return alert("未解析到有效的表格內容");

  window._mdGroupedTables = grouped;
  window._mdParsedTable = grouped.length === 1 ? grouped[0].data : grouped.flatMap(g => g.data);

  const { finalMarkdown, previewHTML } = buildGroupedOutputs(grouped);
  document.getElementById("output").textContent = finalMarkdown;
  document.getElementById("mdTablePreview").innerHTML = previewHTML;
}

function cleanMarkdown() {
  const text = document.getElementById("mdTableInput").value.trim();
  if (!text.includes("|")) return alert("請先貼上 Markdown 表格資料！");

  const lines = text.split("\n").filter(l => l.trim() !== "");
  const tables = [];
  let block = [];
  for (const line of lines) {
    if (line.includes("|")) {
      block.push(line.trim());
    } else if (block.length > 1) {
      tables.push(block);
      block = [];
    }
  }
  if (block.length > 1) tables.push(block);

  let output = "";
  for (const tbl of tables) {
    const header = tbl[0].split("|").filter(Boolean).map(c => c.trim());
    const colCount = header.length;
    output += "| " + header.join(" | ") + " |\n";
    output += "| " + header.map(() => "---").join(" | ") + " |\n";

    for (let i = 2; i < tbl.length; i++) {
      let row = tbl[i].split("|").filter(Boolean).map(c => c.trim());
      if (row.length > colCount) {
        const extra = row.slice(colCount - 1).join(" / ");
        row = row.slice(0, colCount - 1).concat(extra);
      }
      while (row.length < colCount) row.push("");
      output += "| " + row.slice(0, colCount).join(" | ") + " |\n";
    }
    output += "\n";
  }
  document.getElementById("mdTableInput").value = output.trim();
  alert("✅ Markdown 表格已修正完成，額外資料已併入最後一欄！");
}

// ---------- 匯出 ----------

function exportMarkdownToXLSX() {
  const wb = XLSX.utils.book_new();
  if (window._mdGroupedTables && window._mdGroupedTables.length) {
    window._mdGroupedTables.forEach(group => {
      const ws = XLSX.utils.aoa_to_sheet(group.data);
      XLSX.utils.book_append_sheet(wb, ws, group.title.substring(0, 30) || "Sheet");
    });
  } else if (window._mdParsedTable && window._mdParsedTable.length) {
    const ws = XLSX.utils.aoa_to_sheet(window._mdParsedTable);
    XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
  } else {
    return alert("請先轉換 Markdown 表格！");
  }
  XLSX.writeFile(wb, "markdown-export.xlsx");
}

function exportMarkdownToCSV() {
  let csv = "";
  if (window._mdGroupedTables && window._mdGroupedTables.length) {
    window._mdGroupedTables.forEach(group => {
      csv += `\n# ${group.title}\n`;
      csv += group.data.map(row =>
        row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(",")
      ).join("\n") + "\n";
    });
  } else if (window._mdParsedTable && window._mdParsedTable.length) {
    csv = window._mdParsedTable.map(row =>
      row.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(",")
    ).join("\n");
  } else {
    return alert("請先轉換 Markdown 表格！");
  }
  downloadBlob(new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" }), "markdown-table.csv");
}

function exportMarkdownToPDF() {
  const element = document.getElementById('mdTablePreview');
  if (!element || !element.innerHTML.trim()) return alert("請先轉換 Markdown 表格！");

  const opt = {
    margin: 10,
    filename: 'markdown-table.pdf',
    html2canvas: { scale: 2, useCORS: true, allowTaint: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };
  html2pdf().set(opt).from(element).save();
}

function saveAsJSON() {
  if (!window._mdGroupedTables || !window._mdGroupedTables.length) return alert("請先轉換 Markdown 表格！");
  const blob = new Blob([JSON.stringify({ type: "grouped", data: window._mdGroupedTables }, null, 2)], { type: "application/json" });
  downloadBlob(blob, "table-data.json");
}

window.addEventListener("load", () => {
  rebuildFormTypeSelect();
  renderForm();
});
</script>
